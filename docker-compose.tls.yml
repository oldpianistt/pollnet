# Overlay for TLS deployment. Use together with docker-compose.prod.yml:
#
#   docker compose -f docker-compose.prod.yml -f docker-compose.tls.yml up -d --build
#
# Prerequisites on the host:
#   1. cp frontend/nginx-tls.conf.example frontend/nginx-tls.conf
#      (then edit YOUR_DOMAIN_HERE → your real hostname)
#   2. certbot certonly --standalone -d your.domain   # creates /etc/letsencrypt/live/...
#   3. Set DOMAIN=your.domain in .env (only used by the certbot sidecar below).

services:
  web:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./frontend/nginx-tls.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_webroot:/var/www/certbot:ro

  # One-shot helper. Use as:
  #   docker compose -f docker-compose.prod.yml -f docker-compose.tls.yml run --rm certbot \
  #     certonly --webroot -w /var/www/certbot -d $DOMAIN
  certbot:
    image: certbot/certbot:latest
    profiles: ["certbot"]            # only runs when explicitly invoked
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: certbot

volumes:
  certbot_webroot:
