server {
    listen 80;
    server_name _;

    # Slightly larger bodies for poll create payloads (questions + JSONB).
    client_max_body_size 256k;

    # Gzip the static bundle and JSON responses.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Use Docker's embedded DNS so we can resolve the backend hostname at request
    # time. Without this, nginx tries to resolve "backend" at startup and crashes
    # if the upstream container hasn't come up yet.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Reverse-proxy backend: same origin → no CORS in production.
    location /api/ {
        set $backend_upstream "http://backend:8080";
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Health / metrics — same backend. Useful for load balancers, prometheus
    # scrapes, and uptime probes that don't go through /api/.
    location /actuator/ {
        set $actuator_upstream "http://backend:8080";
        proxy_pass $actuator_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        access_log off;
    }

    # SPA fallback: any path that isn't a real file → index.html.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # Hashed assets are cache-busted by filename; index.html must NOT be cached.
        location = /index.html {
            add_header Cache-Control "no-store" always;
        }
    }

    # Long-lived cache for hashed bundles.
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
