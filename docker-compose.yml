services:
  postgres:
    image: postgres:16-alpine
    container_name: pollnet-postgres
    environment:
      POSTGRES_DB: pollnet
      POSTGRES_USER: pollnet
      POSTGRES_PASSWORD: pollnet
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pollnet -d pollnet"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pollnet-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pollnet-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pollnet
      SPRING_DATASOURCE_USERNAME: pollnet
      SPRING_DATASOURCE_PASSWORD: pollnet
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      POLLNET_JWT_SECRET: dev-only-change-me-in-prod-this-must-be-at-least-32-bytes-long
      POLLNET_JWT_ACCESS_TTL_MINUTES: 15
      POLLNET_JWT_REFRESH_TTL_DAYS: 30
      POLLNET_SERVER_PORT: 8080
    ports:
      - "8090:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pollnet-frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8090
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  redis_data:
